<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuietWizard Studios — AI Agency</title>
<meta name="description" content="We build the AI that others only talk about — custom agents, real automation, and strategy that ships.">
<link rel="stylesheet" href="/css/tokens.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  window.sb = supabase.createClient(
    'https://hdqnjmfxnbezlqbdyqvj.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhkcW5qbWZ4bmJlemxxYmR5cXZqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3NzY4NDEsImV4cCI6MjA5MjM1Mjg0MX0.iJQvCwfBncUG0PCzjo37_qa7ZHd-Ld7yFE52B06QtPA'
  );
</script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="/js/Header.jsx"></script>
<script type="text/babel" src="/js/Hero.jsx"></script>
<script type="text/babel" src="/js/Services.jsx"></script>
<script type="text/babel" src="/js/Articles.jsx"></script>
<script type="text/babel" src="/js/Contact.jsx"></script>
<script type="text/babel" src="/js/Footer.jsx"></script>

<script type="text/babel">

// ── Data hook ────────────────────────────────────────────────
const useData = () => {
  const [data, setData] = React.useState({ settings: {}, services: [], articles: [], loading: true });

  React.useEffect(() => {
    const load = async () => {
      const [{ data: settingsRows }, { data: services }, { data: articles }] = await Promise.all([
        window.sb.from('settings').select('key,value'),
        window.sb.from('services').select('*').order('sort_order'),
        window.sb.from('articles').select('id,title,slug,category,cover_image_url,published_at,read_time_minutes,seo_description').eq('published', true).order('published_at', { ascending: false }),
      ]);
      const settings = {};
      (settingsRows || []).forEach(r => { settings[r.key] = r.value; });
      setData({ settings, services: services || [], articles: articles || [], loading: false });
    };
    load();
  }, []);

  return data;
};

// ── Pages ─────────────────────────────────────────────────────
const CodexPage = ({ articles, settings, onNav }) => {
  const cats = ['All', ...new Set(articles.map(a => a.category).filter(Boolean))];
  const [cat, setCat] = React.useState('All');
  const title = settings?.articles_section_title || 'The Codex';
  const filtered = cat === 'All' ? articles : articles.filter(a => a.category === cat);
  return (
    <div style={{ paddingTop: 96, minHeight: '100vh' }}>
      <div style={{ maxWidth: 1200, margin: '0 auto', padding: '64px 48px' }}>
        <div style={{ fontFamily: 'var(--font-ui)', fontSize: 11, fontWeight: 700, letterSpacing: '.25em', textTransform: 'uppercase', color: '#5BB3FF', marginBottom: 14 }}>Knowledge Base</div>
        <h1 style={{ fontFamily: 'var(--font-heading)', fontSize: 'clamp(28px,4vw,52px)', fontWeight: 600, color: '#E8EEF8', marginBottom: 16 }}>{title}</h1>
        <p style={{ fontFamily: 'var(--font-body)', fontSize: 18, color: '#7590AF', lineHeight: 1.75, maxWidth: 520, marginBottom: 40 }}>Practical writing on AI engineering, automation strategy, and building intelligent systems.</p>
        <div style={{ display: 'flex', gap: 8, marginBottom: 48, flexWrap: 'wrap' }}>
          {cats.map(c => (
            <button key={c} onClick={() => setCat(c)} style={{ padding: '6px 16px', borderRadius: 4, border: `1px solid ${cat===c?'#4B8EF5':'#1C2B44'}`, background: cat===c?'rgba(30,95,212,.15)':'transparent', color: cat===c?'#5BB3FF':'#7590AF', fontFamily: 'var(--font-ui)', fontSize: 12, fontWeight: 600, cursor: 'pointer', transition: 'all 200ms' }}>{c}</button>
          ))}
        </div>
        {filtered.length === 0 ? (
          <div style={{ fontFamily: 'var(--font-body)', fontSize: 18, color: '#4F6A8F', padding: '48px 0', textAlign: 'center' }}>No articles published yet.</div>
        ) : (
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill,minmax(280px,1fr))', gap: 16 }}>
            {filtered.map((a, i) => <ArticleCard key={a.id} article={a} large={i===0} onNav={onNav} />)}
          </div>
        )}
      </div>
    </div>
  );
};

const AboutPage = ({ settings }) => (
  <div style={{ paddingTop: 96, minHeight: '100vh' }}>
    <div style={{ maxWidth: 720, margin: '0 auto', padding: '80px 48px' }}>
      <div style={{ fontFamily: 'var(--font-ui)', fontSize: 11, fontWeight: 700, letterSpacing: '.25em', textTransform: 'uppercase', color: '#5BB3FF', marginBottom: 20 }}>About Us</div>
      <h1 style={{ fontFamily: 'var(--font-heading)', fontSize: 'clamp(26px,3.5vw,48px)', fontWeight: 600, color: '#E8EEF8', lineHeight: 1.2, marginBottom: 32 }}>{settings?.about_headline || 'Quiet Work. Real Results.'}</h1>
      <p style={{ fontFamily: 'var(--font-body)', fontSize: 18, color: '#7590AF', lineHeight: 1.85, marginBottom: 24 }}>QuietWizard Studios is a boutique AI agency. We build custom AI agents, automate the workflows that slow businesses down, and advise teams who want a clear path forward — without the noise.</p>
      <p style={{ fontFamily: 'var(--font-body)', fontSize: 18, color: '#7590AF', lineHeight: 1.85, marginBottom: 24 }}>We work with founders, operators, and growth teams at companies of all sizes. Our engagements are scoped tightly, our deliverables are concrete, and we don't disappear after the kickoff call.</p>
      <p style={{ fontFamily: 'var(--font-body)', fontSize: 18, color: '#7590AF', lineHeight: 1.85 }}>The wizard hat with circuit traces is deliberate. The technical craft is real. The sense of wonder is intentional.</p>
      <div style={{ marginTop: 56, padding: 32, background: '#0D1220', border: '1px solid #1C2B44', borderRadius: 6, boxShadow: 'inset 0 1px 0 rgba(255,255,255,.05)' }}>
        <div style={{ fontFamily: 'var(--font-heading)', fontSize: 17, color: '#A8B8CC', lineHeight: 1.75, fontStyle: 'italic' }}>"We build the AI that others only talk about."</div>
      </div>
    </div>
  </div>
);

const WorkPage = () => {
  const projects = [
    { name: 'Sales Intelligence Agent', client: 'B2B SaaS Co.', tags: ['Automation', 'CRM Integration'], year: '2025' },
    { name: 'Document Analysis Pipeline', client: 'Legal Tech Firm', tags: ['RAG', 'LLM'], year: '2025' },
    { name: 'Customer Support Orchestration', client: 'E-Commerce Brand', tags: ['Multi-Agent', 'Tool Use'], year: '2026' },
  ];
  return (
    <div style={{ paddingTop: 96, minHeight: '100vh' }}>
      <div style={{ maxWidth: 1200, margin: '0 auto', padding: '80px 48px' }}>
        <div style={{ fontFamily: 'var(--font-ui)', fontSize: 11, fontWeight: 700, letterSpacing: '.25em', textTransform: 'uppercase', color: '#5BB3FF', marginBottom: 14 }}>Selected Work</div>
        <h1 style={{ fontFamily: 'var(--font-heading)', fontSize: 'clamp(26px,3.5vw,48px)', fontWeight: 600, color: '#E8EEF8', marginBottom: 56 }}>What We've Built</h1>
        <div style={{ display: 'flex', flexDirection: 'column' }}>
          {projects.map((p, i) => (
            <div key={i} style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '24px 0', borderBottom: '1px solid #1C2B44', gap: 24, flexWrap: 'wrap', transition: 'padding-left 200ms', cursor: 'default' }}
              onMouseEnter={e => e.currentTarget.style.paddingLeft = '8px'}
              onMouseLeave={e => e.currentTarget.style.paddingLeft = '0'}
            >
              <div>
                <div style={{ fontFamily: 'var(--font-heading)', fontSize: 18, fontWeight: 600, color: '#E8EEF8', marginBottom: 6 }}>{p.name}</div>
                <div style={{ fontFamily: 'var(--font-ui)', fontSize: 13, color: '#4F6A8F' }}>{p.client}</div>
              </div>
              <div style={{ display: 'flex', gap: 8, alignItems: 'center', flexWrap: 'wrap' }}>
                {p.tags.map(t => <span key={t} style={{ fontSize: 11, fontWeight: 600, padding: '2px 8px', borderRadius: 3, background: 'rgba(30,95,212,.12)', border: '1px solid rgba(30,95,212,.2)', color: '#4B8EF5', fontFamily: 'var(--font-ui)' }}>{t}</span>)}
                <span style={{ fontFamily: 'var(--font-ui)', fontSize: 12, color: '#344D6E', marginLeft: 8 }}>{p.year}</span>
              </div>
            </div>
          ))}
        </div>
        <div style={{ marginTop: 48, padding: '20px 24px', background: '#0D1220', border: '1px solid #1C2B44', borderRadius: 6 }}>
          <p style={{ fontFamily: 'var(--font-ui)', fontSize: 13, color: '#4F6A8F' }}>Client details kept confidential by default. Case studies available on request.</p>
        </div>
      </div>
    </div>
  );
};

// ── App ───────────────────────────────────────────────────────
const App = () => {
  const [page, setPage] = React.useState(() => {
    const sp = new URLSearchParams(window.location.search);
    if (sp.get('slug')) return 'article';
    return localStorage.getItem('qws_page') || 'home';
  });
  const [articleSlug, setArticleSlug] = React.useState(() => new URLSearchParams(window.location.search).get('slug'));
  const { settings, services, articles, loading } = useData();

  const nav = (p, slug) => {
    if (p === 'article' && slug) {
      setArticleSlug(slug);
      window.history.pushState({}, '', `/article.html?slug=${slug}`);
    } else {
      window.history.pushState({}, '', '/');
    }
    setPage(p);
    localStorage.setItem('qws_page', p);
    window.scrollTo({ top: 0 });
  };

  if (loading) return (
    <div style={{ minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
      <div style={{ fontFamily: 'var(--font-heading)', fontSize: 14, color: '#344D6E', letterSpacing: '.1em' }}>Loading…</div>
    </div>
  );

  const renderPage = () => {
    switch (page) {
      case 'services': return <><Services services={services} settings={settings} onNav={nav} /><Contact settings={settings} /><Footer onNav={nav} /></>;
      case 'codex':    return <><CodexPage articles={articles} settings={settings} onNav={nav} /><Footer onNav={nav} /></>;
      case 'about':    return <><AboutPage settings={settings} /><Footer onNav={nav} /></>;
      case 'work':     return <><WorkPage /><Footer onNav={nav} /></>;
      case 'contact':  return <><Contact settings={settings} /><Footer onNav={nav} /></>;
      default:         return <><Hero settings={settings} onNav={nav} /><Services services={services} settings={settings} onNav={nav} /><Articles articles={articles} settings={settings} onNav={nav} /><Contact settings={settings} /><Footer onNav={nav} /></>;
    }
  };

  return (
    <div>
      <Header activePage={page} onNav={nav} />
      {renderPage()}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
