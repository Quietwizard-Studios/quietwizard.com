<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Article — QuietWizard Studios</title>
<link rel="stylesheet" href="/css/tokens.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  window.sb = supabase.createClient(
    'https://hdqnjmfxnbezlqbdyqvj.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhkcW5qbWZ4bmJlemxxYmR5cXZqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3NzY4NDEsImV4cCI6MjA5MjM1Mjg0MX0.iJQvCwfBncUG0PCzjo37_qa7ZHd-Ld7yFE52B06QtPA'
  );
</script>
<style>
  .article-body { font-family: 'EB Garamond', serif; font-size: 19px; line-height: 1.85; color: #AAB9CF; }
  .article-body h2 { font-family: 'Cinzel', serif; font-size: 26px; font-weight: 600; color: #E8EEF8; margin: 48px 0 18px; line-height: 1.3; }
  .article-body h3 { font-family: 'Cinzel', serif; font-size: 20px; font-weight: 500; color: #C8D5E4; margin: 36px 0 14px; }
  .article-body p { margin-bottom: 24px; }
  .article-body a { color: #5BB3FF; text-decoration: underline; }
  .article-body blockquote { border-left: 3px solid #1E5FD4; padding: 4px 0 4px 20px; margin: 32px 0; color: #7590AF; font-style: italic; font-size: 20px; }
  .article-body pre { background: #0D1220; border: 1px solid #1C2B44; border-radius: 6px; padding: 20px; overflow-x: auto; margin: 28px 0; }
  .article-body code { font-family: 'JetBrains Mono', monospace; font-size: 14px; color: #5BB3FF; background: #0D1220; padding: 2px 6px; border-radius: 3px; }
  .article-body pre code { background: none; padding: 0; font-size: 13px; line-height: 1.7; }
  .article-body ul, .article-body ol { padding-left: 24px; margin-bottom: 24px; }
  .article-body li { margin-bottom: 8px; }
  .article-body img { max-width: 100%; border-radius: 6px; margin: 28px 0; border: 1px solid #1C2B44; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="/js/Header.jsx"></script>
<script type="text/babel" src="/js/Footer.jsx"></script>
<script type="text/babel">

const ArticlePage = () => {
  const slug = new URLSearchParams(window.location.search).get('slug');
  const [article, setArticle] = React.useState(null);
  const [loading, setLoading] = React.useState(true);
  const [notFound, setNotFound] = React.useState(false);

  React.useEffect(() => {
    if (!slug) { setNotFound(true); setLoading(false); return; }
    window.sb.from('articles').select('*').eq('slug', slug).eq('published', true).single()
      .then(({ data }) => {
        if (data) {
          setArticle(data);
          document.title = `${data.seo_title || data.title} — QuietWizard Studios`;
          // Update meta description
          let meta = document.querySelector('meta[name="description"]');
          if (!meta) { meta = document.createElement('meta'); meta.name = 'description'; document.head.appendChild(meta); }
          meta.content = data.seo_description || '';
        } else {
          setNotFound(true);
        }
        setLoading(false);
      });
  }, [slug]);

  const nav = (p) => { window.location.href = p === 'home' ? '/' : `/?page=${p}`; };

  if (loading) return (
    <div style={{ minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
      <div style={{ fontFamily: 'var(--font-heading)', fontSize: 14, color: '#344D6E', letterSpacing: '.1em' }}>Loading…</div>
    </div>
  );

  if (notFound) return (
    <div>
      <Header activePage="codex" onNav={nav} />
      <div style={{ paddingTop: 96, minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', flexDirection: 'column', gap: 16 }}>
        <div style={{ fontFamily: 'var(--font-heading)', fontSize: 28, color: '#4F6A8F' }}>Article Not Found</div>
        <a href="/" style={{ fontFamily: 'var(--font-ui)', fontSize: 13, color: '#5BB3FF' }}>← Back to home</a>
      </div>
    </div>
  );

  return (
    <div>
      <Header activePage="codex" onNav={nav} />
      <main style={{ paddingTop: 96 }}>
        {/* Hero */}
        <div style={{ maxWidth: 800, margin: '0 auto', padding: '64px 48px 0' }}>
          {article.category && <div style={{ fontFamily: 'var(--font-ui)', fontSize: 11, fontWeight: 700, letterSpacing: '.25em', textTransform: 'uppercase', color: '#5BB3FF', marginBottom: 16 }}>{article.category}</div>}
          <h1 style={{ fontFamily: 'var(--font-heading)', fontSize: 'clamp(26px,4vw,46px)', fontWeight: 600, color: '#E8EEF8', lineHeight: 1.25, marginBottom: 20 }}>{article.title}</h1>
          <div style={{ display: 'flex', alignItems: 'center', gap: 16, fontFamily: 'var(--font-ui)', fontSize: 13, color: '#4F6A8F', marginBottom: 40, flexWrap: 'wrap' }}>
            {article.author_name && <span>{article.author_name}</span>}
            {article.published_at && <><span>·</span><span>{new Date(article.published_at).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' })}</span></>}
            {article.read_time_minutes && <><span>·</span><span>{article.read_time_minutes} min read</span></>}
          </div>
        </div>

        {/* Cover image */}
        {article.cover_image_url && (
          <div style={{ maxWidth: 900, margin: '0 auto 48px', padding: '0 48px' }}>
            <img src={article.cover_image_url} style={{ width: '100%', maxHeight: 480, objectFit: 'cover', borderRadius: 8, border: '1px solid #1C2B44' }} alt={article.title} />
          </div>
        )}

        {/* Body */}
        <div style={{ maxWidth: 800, margin: '0 auto', padding: '0 48px 96px' }}>
          <div className="article-body" dangerouslySetInnerHTML={{ __html: article.body || '' }} />
          <div style={{ marginTop: 64, paddingTop: 32, borderTop: '1px solid #1C2B44', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
            <a href="/codex" onClick={e => { e.preventDefault(); nav('codex'); }} style={{ fontFamily: 'var(--font-ui)', fontSize: 13, color: '#5BB3FF', textDecoration: 'none' }}>← All Articles</a>
            <div style={{ fontFamily: 'var(--font-display)', fontSize: 13, fontWeight: 700, color: '#253652', letterSpacing: '.02em' }}>QuietWizard</div>
          </div>
        </div>
      </main>
      <Footer onNav={nav} />
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<ArticlePage />);
</script>
</body>
</html>
